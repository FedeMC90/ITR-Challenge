<div class="login-container">
  <div class="login-card">
    <h2>Login to E-Commerce</h2>

    <form (ngSubmit)="onSubmit()" #loginForm="ngForm">
      <div class="form-group">
        <label for="email">Email</label>
        <input
          type="email"
          id="email"
          name="email"
          [(ngModel)]="credentials.email"
          required
          email
          placeholder="admin@admin.com"
          class="form-input"
        />
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input
          type="password"
          id="password"
          name="password"
          [(ngModel)]="credentials.password"
          required
          placeholder="12345678"
          class="form-input"
        />
      </div>

      <div *ngIf="error" class="error-message">
        {{ error }}
      </div>

      <button
        type="submit"
        class="btn-login"
        [disabled]="!loginForm.valid || loading"
      >
        {{ loading ? 'Logging in...' : 'Login' }}
      </button>

      <button type="button" class="btn-register" (click)="openRegisterModal()">
        Register
      </button>
    </form>

    <div class="hint-box">
      <p><strong>Test Credentials:</strong></p>
      <p>Email: <code>admin&#64;admin.com</code></p>
      <p>Password: <code>12345678</code></p>
      <p class="note">Make sure the backend seeder has been run.</p>
    </div>
  </div>

  <!-- Register Modal -->
  <div
    class="modal-overlay"
    *ngIf="showRegisterModal"
    (click)="closeRegisterModal()"
  >
    <div class="register-modal" (click)="$event.stopPropagation()">
      <h3>Create New Account</h3>

      <form (ngSubmit)="onRegister()" #registerForm="ngForm">
        <div class="form-group">
          <label for="registerEmail">Email</label>
          <input
            type="email"
            id="registerEmail"
            name="registerEmail"
            [(ngModel)]="registerCredentials.email"
            required
            email
            placeholder="your.email@example.com"
            class="form-input"
          />
        </div>

        <div class="form-group">
          <label for="registerPassword">Password</label>
          <input
            type="password"
            id="registerPassword"
            name="registerPassword"
            [(ngModel)]="registerCredentials.password"
            required
            minlength="8"
            placeholder="Minimum 8 characters"
            class="form-input"
          />
        </div>

        <div *ngIf="registerError" class="error-message">
          {{ registerError }}
        </div>

        <div *ngIf="registerSuccess" class="success-message">
          ✓ Account created successfully!
        </div>

        <div class="modal-buttons">
          <button
            type="button"
            class="btn-cancel"
            (click)="closeRegisterModal()"
            [disabled]="registerLoading"
          >
            Cancel
          </button>
          <button
            type="submit"
            class="btn-confirm"
            [disabled]="
              !registerForm.valid || registerLoading || registerSuccess
            "
          >
            {{ registerLoading ? 'Creating...' : 'Create Account' }}
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
